name: Update README

on:
  schedule:
    # Runs once a day at 03:00 UTC — edit the cron to change frequency
    - cron: "0 3 * * *"
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update Open Source Contributions table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: Aditya-myst
        run: python3 scripts/update_readme.py

      - name: Commit changes if any
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update README (open source contributions)"
          file_pattern: README.md
